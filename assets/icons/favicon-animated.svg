<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <clipPath id="clipCircle"><circle cx="256" cy="256" r="225" /></clipPath>
    <style>
      .badge { opacity: 0; animation: fadeIn .35s ease-out forwards; }
      .trace { stroke: #FFFFFF; stroke-width: 52; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw .8s ease forwards; }
