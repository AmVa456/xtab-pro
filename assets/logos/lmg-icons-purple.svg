<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Collection of LMG Icons -->
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#da70d6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book Icon -->
  <g transform="translate(50, 50)">
    <path d="M 30 10 L 60 10 L 60 80 L 30 80 Z" fill="none" stroke="url(#purpleGradient)" stroke-width="2" />
    <path d="M 30 10 L 40 10 L 40 80 L 30 80 Z" fill="url(#purpleGradient)" opacity="0.3" />
    <circle cx="45" cy="45" r="8" fill="none" stroke="url(#purpleGradient)" stroke-width="2" />
    <path d="M 20 5 L 70 5" stroke="url(#purpleGradient)" stroke-width="2" />
  </g>
  
  <!-- People Icon -->
  <g transform="translate(250, 50)">
    <circle cx="30" cy="20" r="8" fill="url(#purpleGradient)" />
    <circle cx="55" cy="15" r="8" fill="url(#purpleGradient)" />
    <circle cx="75" cy="20" r="8" fill="url(#purpleGradient)" />
    <path d="M 20 35 L 40 35 L 40 70 L 20 70 Z" fill="url(#purpleGradient)" opacity="0.7" />
    <path d="M 50 30 L 65 30 L 65 70 L 50 70 Z" fill="url(#purpleGradient)" opacity="0.7" />
    <path d="M 75 35 L 90 35 L 90 70 L 75 70 Z" fill="url(#purpleGradient)" opacity="0.7" />
  </g>
  
  <!-- Heart Icon -->
  <g transform="translate(50, 200)">
    <path d="M 50 85 C 50 85, 20 55, 20 30 C 20 15, 30 5, 40 5 C 45 5, 50 8, 50 8 C 50 8, 55 5, 60 5 C 70 5, 80 15, 80 30 C 80 55, 50 85, 50 85 Z" fill="none" stroke="url(#purpleGradient)" stroke-width="2.5" />
  </g>
  
  <!-- Heart with Gradient Fill -->
  <g transform="translate(250, 200)">
    <path d="M 50 85 C 50 85, 20 55, 20 30 C 20 15, 30 5, 40 5 C 45 5, 50 8, 50 8 C 50 8, 55 5, 60 5 C 70 5, 80 15, 80 30 C 80 55, 50 85, 50 85 Z" fill="url(#purpleGradient)" opacity="0.8" />
  </g>
</svg>