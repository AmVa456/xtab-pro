<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Story + Community Icons -->
  <defs>
    <linearGradient id="storyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8a5c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59fc6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Story Book Icon -->
  <g transform="translate(50, 40)">
    <rect x="10" y="10" width="80" height="100" rx="5" fill="none" stroke="url(#storyGradient)" stroke-width="3" />
    <rect x="15" y="15" width="25" height="90" fill="url(#storyGradient)" opacity="0.2" />
    <circle cx="50" cy="50" r="15" fill="none" stroke="url(#storyGradient)" stroke-width="2" />
    <polygon points="50,40 58,55 42,55" fill="url(#storyGradient)" />
    <text x="50" y="80" text-anchor="middle" font-family="Arial" font-size="10" fill="url(#storyGradient)">story</text>
  </g>
  
  <!-- Community People Icon -->
  <g transform="translate(200, 40)">
    <circle cx="20" cy="15" r="8" fill="url(#storyGradient)" />
    <circle cx="50" cy="10" r="8" fill="url(#storyGradient)" />
    <circle cx="80" cy="15" r="8" fill="url(#storyGradient)" />
    <path d="M 10 30 L 30 30 L 30 70 L 10 70 Z" fill="url(#storyGradient)" opacity="0.6" />
    <path d="M 45 25 L 60 25 L 60 70 L 45 70 Z" fill="url(#storyGradient)" opacity="0.6" />
    <path d="M 75 30 L 95 30 L 95 70 L 75 70 Z" fill="url(#storyGradient)" opacity="0.6" />
  </g>
</svg>