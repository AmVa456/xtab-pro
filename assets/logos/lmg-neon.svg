<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- LM Neon Logo (Pink to Yellow gradient) -->
  <defs>
    <style>
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 8px #ff1493); }
        50% { filter: drop-shadow(0 0 12px #ffd700); }
      }
      .neon-text { animation: glow 3s infinite; font-family: Arial, sans-serif; font-size: 120px; font-weight: bold; }
    </style>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Crown -->
  <path d="M 100 20 L 115 60 L 140 40 L 125 80 L 150 80 L 120 100 L 140 130 L 100 110 L 60 130 L 80 100 L 50 80 L 75 80 L 60 40 L 85 60 Z" fill="url(#neonGradient)" />
  
  <!-- LM Text -->
  <text x="100" y="160" text-anchor="middle" fill="url(#neonGradient)" class="neon-text">LM</text>
</svg>